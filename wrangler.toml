name = "exalyte-ai"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = ""
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

[[routes]]
pattern = "/api/*"
script = "functions/api/[[route]].js"

[env.production]
vars = { ENVIRONMENT = "production" }
