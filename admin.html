<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#7c3aed">
  <title>Exalyte AI - Admin Panel</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 12px;
      --transition: all 0.2s ease;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: var(--transition);
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      background: var(--primary);
      color: white;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .btn-sm {
      padding: 0.375rem 0.75rem;
      font-size: 0.8rem;
    }

    .btn-success {
      background: var(--success);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-warning {
      background: var(--warning);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .stat-card h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .table-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow-x: auto;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    tr:hover {
      background: var(--bg);
    }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-badge.premium {
      background: #fef3c7;
      color: #92400e;
    }

    .status-badge.free {
      background: #e0e7ff;
      color: #3730a3;
    }

    .status-badge.banned {
      background: #fee2e2;
      color: #991b1b;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      border: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }
      
      .header {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Exalyte Admin</div>
    <div>
      <button class="btn btn-outline btn-sm" onclick="toggleTheme()">Theme</button>
      <button class="btn btn-outline btn-sm" onclick="window.location.href='/dashboard.html'">Dashboard</button>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Premium Users</h3>
        <div class="value" id="premiumUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Banned Users</h3>
        <div class="value" id="bannedUsers">0</div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Status</th>
            <th>Credits</th>
            <th>Premium Until</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="7" style="text-align:center;">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Grant Premium Modal -->
  <div class="modal" id="grantModal">
    <div class="modal-content">
      <h3>Grant Premium Access</h3>
      <div class="form-group">
        <label>Days</label>
        <input type="number" id="grantDays" value="30" min="1" max="365">
      </div>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button class="btn btn-success" onclick="confirmGrant()">Grant Premium</button>
        <button class="btn btn-outline" onclick="closeGrantModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let selectedUserEmail = null;

    // Theme
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function setTheme(theme) {
      localStorage.setItem('theme', theme);
      document.body.classList.toggle('dark', theme === 'dark');
    }

    function toggleTheme() {
      setTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }

    setTheme(getTheme());

    // Auth check
    if (!localStorage.getItem('token')) {
      window.location.href = '/';
    }

    async function loadUsers() {
      try {
        const response = await fetch(`${API_BASE}/admin/users`, {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          }
        });

        if (!response.ok) {
          if (response.status === 403) {
            window.location.href = '/dashboard.html';
            return;
          }
          throw new Error('Failed to load users');
        }

        const users = await response.json();
        renderUsers(users);
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      
      let totalUsers = users.length;
      let premiumUsers = 0;
      let bannedUsers = 0;
      
      users.forEach(user => {
        const isPremium = user.premium_until && new Date(user.premium_until) > new Date();
        if (isPremium) premiumUsers++;
        if (user.is_banned) bannedUsers++;
      });
      
      document.getElementById('totalUsers').textContent = totalUsers;
      document.getElementById('premiumUsers').textContent = premiumUsers;
      document.getElementById('bannedUsers').textContent = bannedUsers;
      
      tbody.innerHTML = users.map(user => {
        const isPremium = user.premium_until && new Date(user.premium_until) > new Date();
        let statusClass = 'free';
        let statusText = 'Free';
        
        if (user.is_banned) {
          statusClass = 'banned';
          statusText = 'Banned';
        } else if (isPremium) {
          statusClass = 'premium';
          statusText = 'Premium';
        }
        
        const premiumUntil = user.premium_until 
          ? new Date(user.premium_until).toLocaleDateString() 
          : '-';
        
        const created = new Date(user.created_at).toLocaleDateString();
        
        return `
          <tr>
            <td><strong>${user.name || 'N/A'}</strong></td>
            <td>${user.email}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>${user.credits_left}</td>
            <td>${premiumUntil}</td>
            <td>${created}</td>
            <td>
              <div class="actions">
                <button class="btn btn-success btn-sm" onclick="openGrantModal('${user.email}')">Grant Premium</button>
                ${isPremium ? `<button class="btn btn-danger btn-sm" onclick="revokePremium('${user.email}')">Revoke</button>` : ''}
                ${user.is_banned ? `<button class="btn btn-warning btn-sm" onclick="unbanUser('${user.email}')">Unban</button>` : ''}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openGrantModal(email) {
      selectedUserEmail = email;
      document.getElementById('grantModal').classList.add('active');
      document.getElementById('grantDays').value = 30;
    }

    function closeGrantModal() {
      document.getElementById('grantModal').classList.remove('active');
      selectedUserEmail = null;
    }

    async function confirmGrant() {
      const days = parseInt(document.getElementById('grantDays').value);
      if (!days || days < 1) return;
      
      try {
        const response = await fetch(`${API_BASE}/admin/grant`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ email: selectedUserEmail, days })
        });
        
        if (response.ok) {
          closeGrantModal();
          loadUsers();
        } else {
          const data = await response.json();
          alert('Error: ' + data.error);
        }
      } catch (error) {
        alert('Error granting premium');
      }
    }

    async function revokePremium(email) {
      if (!confirm('Revoke premium access for ' + email + '?')) return;
      
      try {
        const response = await fetch(`${API_BASE}/admin/revoke`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ email })
        });
        
        if (response.ok) {
          loadUsers();
        }
      } catch (error) {
        alert('Error revoking premium');
      }
    }

    async function unbanUser(email) {
      if (!confirm('Unban user ' + email + '?')) return;
      
      try {
        const response = await fetch(`${API_BASE}/admin/unban`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ email })
        });
        
        if (response.ok) {
          loadUsers();
        }
      } catch (error) {
        alert('Error unbanning user');
      }
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/';
    }

    // Modal click outside to close
    document.getElementById('grantModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('grantModal')) {
        closeGrantModal();
      }
    });

    // Load users on page load
    loadUsers();
  </script>
</body>
</html>
